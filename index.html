<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coco Cadeaux — Portfolio Manager</title>
<style>
:root { --navy:#2F3847; --peach:#EBBA98; --blush:#F1EBEB; --gray-light:#F7F5F3; --white:#FFFFFF; }
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Montserrat',system-ui,sans-serif;background:var(--gray-light);color:var(--navy);}

.topbar{background:var(--navy);color:var(--white);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;}
.topbar h1{font-size:1.1rem;font-weight:600;}

.main{max-width:1400px;margin:0 auto;padding:1.5rem 2rem;}

/* Upload */
.upload-area{background:var(--white);border:2px dashed #ccc;border-radius:12px;padding:2.5rem 2rem;text-align:center;margin-bottom:1.5rem;cursor:pointer;transition:border-color .2s;}
.upload-area:hover{border-color:var(--peach);}
.upload-area .icon{font-size:2.5rem;color:var(--peach);}
.upload-area p{color:#888;margin-top:.5rem;font-size:.9rem;}

/* Toolbar */
.toolbar{display:flex;background:var(--navy);color:var(--white);padding:.6rem 1.2rem;border-radius:8px;margin-bottom:1rem;align-items:center;gap:.75rem;flex-wrap:wrap;}
.toolbar span{font-size:.85rem;}
.toolbar .btn{font-size:.8rem;padding:.4rem .8rem;}
.toolbar .btn--light{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);}

/* Buttons */
.btn{padding:.6rem 1.2rem;border:none;border-radius:6px;font-size:.85rem;cursor:pointer;font-family:inherit;font-weight:500;}
.btn--primary{background:var(--navy);color:var(--white);}
.btn--secondary{background:var(--blush);color:var(--navy);}
.btn--danger{background:#c00;color:#fff;}
.btn--sm{padding:.3rem .7rem;font-size:.75rem;}

/* Series Group */
.series-group{margin-bottom:2rem;}
.series-header{font-size:.95rem;font-weight:600;padding:.5rem 0;border-bottom:2px solid var(--peach);margin-bottom:.75rem;display:flex;justify-content:space-between;align-items:center;}
.series-header span{font-size:.8rem;color:#888;font-weight:400;}

/* Photo Grid */
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:.75rem;}
.photo-card{background:var(--white);border-radius:6px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);position:relative;cursor:pointer;transition:outline .15s;}
.photo-card.selected{outline:3px solid var(--peach);}
.photo-card .check{position:absolute;top:6px;left:6px;width:22px;height:22px;border-radius:50%;background:rgba(255,255,255,.9);border:2px solid #ccc;display:flex;align-items:center;justify-content:center;font-size:12px;z-index:2;color:transparent;}
.photo-card.selected .check{background:var(--peach);border-color:var(--peach);color:#fff;}
.photo-card img{width:100%;height:120px;object-fit:cover;}
.photo-card .meta{padding:.4rem .5rem;font-size:.7rem;}
.photo-card .meta .badges{display:flex;gap:.25rem;flex-wrap:wrap;margin-top:.2rem;}
.photo-card .meta .badge{font-size:.6rem;padding:1px 4px;border-radius:3px;font-weight:600;}
.badge--visible{background:#d4edda;color:#155724;}
.badge--hidden{background:#f8d7da;color:#721c24;}
.badge--featured{background:var(--peach);color:var(--navy);}

/* Tags */
.tag-chips{display:flex;flex-wrap:wrap;gap:.35rem;}
.tag-chip{display:inline-flex;padding:.25rem .6rem;border-radius:20px;font-size:.75rem;cursor:pointer;border:1px solid #ddd;background:var(--white);transition:all .15s;user-select:none;}
.tag-chip.active{background:var(--navy);color:#fff;border-color:var(--navy);}

/* Edit Form */
.edit-form{background:var(--white);border-radius:12px;padding:1.5rem;box-shadow:0 2px 12px rgba(0,0,0,.08);margin-bottom:1.5rem;display:none;}
.edit-form.is-active{display:block;}
.edit-form h3{margin-bottom:.25rem;font-size:1rem;}
.edit-form .sub{font-size:.8rem;color:#888;margin-bottom:1rem;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;}
.form-group{display:flex;flex-direction:column;gap:.25rem;}
.form-group.full{grid-column:1/-1;}
.form-group label{font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:#888;}
.form-group input,.form-group select{padding:.5rem .7rem;border:1px solid #ddd;border-radius:6px;font-size:.85rem;font-family:inherit;}
.form-actions{grid-column:1/-1;display:flex;gap:.75rem;margin-top:.25rem;}

.toast{position:fixed;bottom:2rem;right:2rem;background:var(--navy);color:#fff;padding:.6rem 1.2rem;border-radius:8px;font-size:.85rem;transform:translateY(100px);opacity:0;transition:all .3s;z-index:999;}
.toast.is-visible{transform:translateY(0);opacity:1;}

@media(max-width:768px){.form-grid{grid-template-columns:1fr;}.main{padding:1rem;}}
</style>
</head>
<body>

<div class="topbar">
  <h1>Coco Cadeaux — Portfolio Manager</h1>
  <button class="btn btn--sm" onclick="loadGallery()" style="background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);">Refresh</button>
</div>

<div class="main">
  <button class="btn btn--primary" id="uploadBtn" style="padding:.8rem 2rem;font-size:1rem;margin-bottom:1.5rem;">&#128247; Upload Photos</button>

  <div class="toolbar" id="toolbar" style="display:none;">
    <span id="selCount">0 selected</span>
    <button class="btn btn--light" onclick="selectAll()">Select All</button>
    <button class="btn btn--light" onclick="deselectAll()">Deselect</button>
    <button class="btn btn--primary btn--sm" onclick="openBulkEdit()">Bulk Edit</button>
    <button class="btn btn--sm" onclick="bulkToggleGallery(true)" style="background:#d4edda;color:#155724;border:none;">Show in Gallery</button>
    <button class="btn btn--sm" onclick="bulkToggleGallery(false)" style="background:#f8d7da;color:#721c24;border:none;">Hide from Gallery</button>
    <button class="btn btn--sm btn--danger" onclick="bulkDelete()">Delete Selected</button>
    <button class="btn btn--sm" onclick="copySelectedUrls()" style="background:var(--navy);color:#fff;border:none;">Copy URLs</button>
  </div>

  <div class="edit-form" id="editForm">
    <h3 id="editTitle">Edit Details</h3>
    <p class="sub" id="editSub">Update selected photos</p>
    <div class="form-grid">
      <div class="form-group full">
        <label>Tags</label>
        <div class="tag-chips" id="tagChips"></div>
      </div>
      <div class="form-group"><label>Series / Event</label><input type="text" id="fSeries" placeholder="e.g. anderson-wedding"></div>
      <div class="form-group"><label>Title</label><input type="text" id="fTitle" placeholder="e.g. The Anderson Wedding"></div>
      <div class="form-group full"><label>Alt Text</label><input type="text" id="fAlt" placeholder="Describe the image"></div>
      <div class="form-group"><label>Photographer</label><input type="text" id="fPhotog" placeholder="e.g. Sarah James Photography"></div>
      <div class="form-group"><label>Photographer Link</label><input type="url" id="fPhotogLink" placeholder="https://..."></div>
      <div class="form-group"><label>Location</label><input type="text" id="fLocation" placeholder="e.g. Oak Hill Estate, Franklin TN"></div>
      <div class="form-group"><label>Year</label><input type="number" id="fYear" placeholder="2026"></div>
      <div class="form-group"><label>Sort Order</label><input type="number" id="fSort" placeholder="1"></div>
      <div class="form-group"><label>Featured?</label><select id="fFeatured"><option value="FALSE">No</option><option value="TRUE">Yes</option></select></div>
      <div class="form-group"><label>Show in Gallery?</label><select id="fShowGallery"><option value="FALSE">No — hidden</option><option value="TRUE">Yes — show on website</option></select></div>
      <div class="form-actions">
        <button class="btn btn--primary" id="saveBtn" onclick="saveEdits()">Save Changes</button>
        <button class="btn btn--secondary" onclick="closeEdit()">Cancel</button>
      </div>
    </div>
  </div>

  <div id="galleryContainer"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const CONFIG = {
  cloudName:'dyxhnihhi', uploadPreset:'portfolio_unsigned', folder:'portfolio',
  sheetApiUrl:'https://script.google.com/macros/s/AKfycbxvQKQ3LkpozkBZjvP7H7fXNXei39nmq8EetSbs8AdI4Mgur_XIsvu_Vta_9WswNrtUbw/exec',
};
const TAGS = ['Weddings','Catering','Charcuterie','Grazing','Corporate','Showers','Events','Florals','Tablescapes','Picnics'];
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);

/* ── Toast ── */
function toast(msg){ const el=$('#toast');el.textContent=msg;el.classList.add('is-visible');setTimeout(()=>el.classList.remove('is-visible'),3000); }

/* ── Tags ── */
let editTags = new Set();
function renderTags(){
  $('#tagChips').innerHTML = TAGS.map(t=>`<span class="tag-chip ${editTags.has(t)?'active':''}" onclick="toggleTag('${t}')">${t}</span>`).join('');
}
window.toggleTag = function(t){ if(editTags.has(t)) editTags.delete(t); else editTags.add(t); renderTags(); };
renderTags();

/* ── Cloudinary ── */
const cld = document.createElement('script');
cld.src = 'https://upload-widget.cloudinary.com/latest/global/all.js';
document.head.appendChild(cld);

// Auto-generate batch series name for each upload session
function makeBatchName(){
  const d=new Date();
  const pad=n=>String(n).padStart(2,'0');
  return 'batch-'+d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate())+'-'+pad(d.getHours())+pad(d.getMinutes());
}

$('#uploadBtn').addEventListener('click', ()=>{
  if(typeof cloudinary==='undefined'){toast('Widget loading, try again...');return;}
  const batchSeries = makeBatchName();
  let uploadCount = 0;
  const w = cloudinary.createUploadWidget({
    cloudName:CONFIG.cloudName, uploadPreset:CONFIG.uploadPreset, folder:CONFIG.folder,
    sources:['local','camera'], multiple:true, maxFileSize:15000000,
    clientAllowedFormats:['jpg','jpeg','png','webp'], showAdvancedOptions:false, cropping:false, showPoweredBy:false,
    styles:{palette:{window:'#FFF',windowBorder:'#2F3847',tabIcon:'#2F3847',menuIcons:'#2F3847',textDark:'#2F3847',textLight:'#FFF',link:'#EBBA98',action:'#EBBA98',inactiveTabIcon:'#999',error:'#C00',inProgress:'#EBBA98',complete:'#2F3847',sourceBg:'#F7F5F3'}}
  }, (err,result)=>{
    if(err){toast('Upload error');return;}
    if(result.event==='success'){
      uploadCount++;
      const info=result.info;
      fetch(CONFIG.sheetApiUrl,{method:'POST',headers:{'Content-Type':'text/plain'},
        body:JSON.stringify({action:'add',data:{image_url:info.secure_url,tags:'',series:batchSeries,title:'',alt_text:'',photographer_name:'',photographer_link:'',location:'',year:new Date().getFullYear().toString(),featured:'FALSE',sort_order:String(uploadCount),show_in_gallery:'FALSE'}})
      }).then(r=>r.json()).then(j=>{
        if(j.status==='ok') toast(uploadCount+' photo(s) uploaded → series: '+batchSeries);
        else toast('Save error: '+(j.message||'unknown'));
      }).catch(e=>toast('Save error: '+e.message));
    }
    if(result.event==='close') loadGallery();
  });
  w.open();
});

/* ── Gallery Data ── */
let data = [];
let selected = new Set();

async function loadGallery(){
  selected.clear();
  try{
    const res = await fetch(CONFIG.sheetApiUrl+'?action=get');
    const json = await res.json();
    if(json.status==='ok') data=json.data||[];
    else data=[];
  }catch(e){data=[];}
  render();
}

function render(){
  // Group by series
  const groups = {};
  const unsorted = [];
  data.forEach((item,i)=>{
    item._idx = i; // track original index for update
    const s = item.series || '';
    if(!s){ unsorted.push(item); return; }
    if(!groups[s]) groups[s]=[];
    groups[s].push(item);
  });
  // Sort within each group by sort_order
  Object.values(groups).forEach(g=>g.sort((a,b)=>(parseInt(a.sort_order)||0)-(parseInt(b.sort_order)||0)));

  let html = '';

  // Unsorted first
  if(unsorted.length){
    html += renderGroup('Untagged / No Series', unsorted);
  }
  // Then sorted groups
  const sortedKeys = Object.keys(groups).sort();
  sortedKeys.forEach(k=>{
    html += renderGroup(k, groups[k]);
  });

  if(!data.length) html='<p style="color:#888;text-align:center;padding:2rem;">No photos yet. Upload some!</p>';

  $('#galleryContainer').innerHTML = html;
  updateToolbar();
}

function renderGroup(name, items){
  const visCount = items.filter(x=>isTrue(x.show_in_gallery)).length;
  return `<div class="series-group">
    <div class="series-header">${name} <span>${items.length} photos &bull; ${visCount} visible</span> <button class="btn btn--sm btn--secondary" onclick="event.stopPropagation();selectSeries('${name.replace(/'/g,"\\'")}')" style="font-size:.7rem;padding:2px 8px;">Select All in Series</button></div>
    <div class="photo-grid">${items.map(item=>{
      const i = item._idx;
      const sel = selected.has(i);
      const vis = isTrue(item.show_in_gallery);
      const feat = isTrue(item.featured);
      const tags = (item.tags||'').split(',').filter(Boolean);
      return `<div class="photo-card ${sel?'selected':''}" onclick="toggle(${i})">
        <div class="check">${sel?'&#10003;':''}</div>
        <img src="${thumb(item.image_url,320,240)}" loading="lazy">
        <div class="meta">
          <div style="font-weight:500;">${item.title||'Untitled'}</div>
          <div class="badges">
            ${tags.map(t=>`<span class="badge" style="background:var(--blush);">${t.trim()}</span>`).join('')}
            <span class="badge ${vis?'badge--visible':'badge--hidden'}">${vis?'Visible':'Hidden'}</span>
            ${feat?'<span class="badge badge--featured">Featured</span>':''}
          </div>
          <button onclick="event.stopPropagation();copyUrl(${i})" style="margin-top:4px;padding:2px 6px;font-size:.65rem;background:var(--navy);color:#fff;border:none;border-radius:3px;cursor:pointer;">Copy URL</button>
        </div>
      </div>`;
    }).join('')}</div>
  </div>`;
}

function thumb(url,w,h){return (url||'').replace('/upload/',`/upload/c_fill,w_${w},h_${h},q_auto,f_auto/`);}

/* ── Copy URLs ── */
window.copyUrl = function(i){
  const url = data[i]?.image_url||'';
  navigator.clipboard.writeText(url).then(()=>toast('URL copied!')).catch(()=>{
    // Fallback
    const ta=document.createElement('textarea');ta.value=url;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('URL copied!');
  });
};
window.copySelectedUrls = function(){
  if(!selected.size){toast('Select photos first');return;}
  const urls=Array.from(selected).map(i=>data[i]?.image_url||'').filter(Boolean).join('\n');
  navigator.clipboard.writeText(urls).then(()=>toast(selected.size+' URL(s) copied!')).catch(()=>{
    const ta=document.createElement('textarea');ta.value=urls;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast(selected.size+' URL(s) copied!');
  });
};

/* Helper: normalize boolean/string true/false from sheet */
function isTrue(v){ return v===true||v==='TRUE'||v==='true'; }

/* ── Selection ── */
window.toggle = function(i){ if(selected.has(i)) selected.delete(i); else selected.add(i); render(); };
window.selectAll = function(){ data.forEach((_,i)=>selected.add(i)); render(); };
window.selectSeries = function(name){
  data.forEach((item,i)=>{ if((item.series||'')===(name==='Untagged / No Series'?'':name)) selected.add(i); });
  render();
};
window.deselectAll = function(){ selected.clear(); render(); };

function updateToolbar(){
  const tb=$('#toolbar');
  if(data.length){tb.style.display='flex';$('#selCount').textContent=selected.size+' selected';}
  else tb.style.display='none';
}

/* ── Quick Gallery Toggle ── */
window.bulkToggleGallery = async function(show){
  if(!selected.size){toast('Select photos first');return;}
  // Immediate UI feedback
  const total=selected.size;
  toast(`Updating ${total} photo(s)...`);
  // Optimistic UI update — immediately flip badges
  for(const idx of selected){
    data[idx].show_in_gallery=show?'TRUE':'FALSE';
  }
  render(); // instant visual feedback
  // Now save to sheet in background
  let count=0;
  const promises=[];
  for(const idx of selected){
    const item=data[idx];
    const row={image_url:item.image_url,tags:item.tags||'',series:item.series||'',title:item.title||'',alt_text:item.alt_text||'',photographer_name:item.photographer_name||'',photographer_link:item.photographer_link||'',location:item.location||'',year:item.year||'',featured:isTrue(item.featured)?'TRUE':'FALSE',sort_order:item.sort_order||'1',show_in_gallery:show?'TRUE':'FALSE'};
    promises.push(
      fetch(CONFIG.sheetApiUrl,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'update',rowIndex:idx+2,data:row})})
        .then(r=>r.json()).then(j=>{if(j.status==='ok')count++;}).catch(()=>{})
    );
  }
  await Promise.all(promises);
  toast(`${count}/${total} photo(s) ${show?'shown':'hidden'}`);
  selected.clear(); loadGallery();
};

/* ── Bulk Delete ── */
window.bulkDelete = async function(){
  if(!selected.size){toast('Select photos first');return;}
  if(!confirm(`Delete ${selected.size} photo(s)? This cannot be undone.`))return;
  const total=selected.size;
  toast(`Deleting ${total} photo(s)...`);
  // Delete from highest index first so row numbers don't shift
  const indices=Array.from(selected).sort((a,b)=>b-a);
  let count=0;
  for(const idx of indices){
    try{
      const res=await fetch(CONFIG.sheetApiUrl,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'delete',rowIndex:idx+2})});
      const j=await res.json();if(j.status==='ok')count++;
    }catch(e){}
  }
  toast(`Deleted ${count}/${total} photo(s)`);
  selected.clear(); loadGallery();
};

/* ── Edit Form ── */
let editMode=''; // 'single' or 'bulk'
let editIdx=-1;

window.openBulkEdit = function(){
  if(!selected.size){toast('Select photos first');return;}
  editMode='bulk';
  editTags=new Set(); renderTags();
  ['fSeries','fTitle','fAlt','fPhotog','fPhotogLink','fLocation','fYear','fSort'].forEach(id=>$('#'+id).value='');
  $('#fFeatured').value='FALSE'; $('#fShowGallery').value='FALSE';
  $('#editTitle').textContent=`Bulk Edit (${selected.size} photos)`;
  $('#editSub').textContent='Only filled fields will update. Tags will replace existing.';
  $('#editForm').classList.add('is-active');
  window.scrollTo({top:$('#editForm').offsetTop-20,behavior:'smooth'});
};

window.closeEdit = function(){ $('#editForm').classList.remove('is-active'); editMode=''; };

window.saveEdits = async function(){
  const tags = Array.from(editTags).join(',');
  const indices = editMode==='single'?[editIdx]:Array.from(selected);
  const total=indices.length;
  $('#saveBtn').disabled=true; $('#saveBtn').textContent=`Saving ${total}...`;
  let count=0;
  const promises=[];
  for(const idx of indices){
    const item=data[idx];
    const row={
      image_url:item.image_url,
      tags: tags||item.tags||'',
      series: $('#fSeries').value||item.series||'',
      title: $('#fTitle').value||item.title||'',
      alt_text: $('#fAlt').value||item.alt_text||'',
      photographer_name: $('#fPhotog').value||item.photographer_name||'',
      photographer_link: $('#fPhotogLink').value||item.photographer_link||'',
      location: $('#fLocation').value||item.location||'',
      year: $('#fYear').value||item.year||'',
      featured: $('#fFeatured').value||(isTrue(item.featured)?'TRUE':'FALSE'),
      sort_order: $('#fSort').value||item.sort_order||'1',
      show_in_gallery: $('#fShowGallery').value||(isTrue(item.show_in_gallery)?'TRUE':'FALSE')
    };
    promises.push(
      fetch(CONFIG.sheetApiUrl,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'update',rowIndex:idx+2,data:row})})
        .then(r=>r.json()).then(j=>{if(j.status==='ok')count++;}).catch(()=>{})
    );
  }
  await Promise.all(promises);
  toast(`Updated ${count}/${total} photo(s)`);
  $('#saveBtn').disabled=false; $('#saveBtn').textContent='Save Changes';
  closeEdit(); selected.clear(); loadGallery();
};

/* ── Init ── */
loadGallery();
</script>
</body>
</html>
